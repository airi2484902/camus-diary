<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カミュの書斎</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #1a110d;
    }

    /* 🌹 カミュの書斎の木目の机（背景） */
    .desk-bg {
      width: 100vw;
      height: 100vh;
      background-image: url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?q=80&w=1080&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15vw; /* ノートとスマホの隙間 */
    }

    /* 🌹 革装丁の日記帳（CSSで描画！） */
    .book {
      width: 130px;
      height: 190px;
      background: linear-gradient(45deg, #3a2318, #4a2c1f);
      border-radius: 4px 12px 12px 4px;
      box-shadow: 12px 15px 20px rgba(0,0,0,0.7), inset -4px 0 8px rgba(0,0,0,0.3);
      position: relative;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* 本の背表紙の溝 */
    .book::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 6px;
      background: rgba(0,0,0,0.4);
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .book-title {
      color: #d4af37; /* ゴールド文字 */
      font-family: 'Noto Serif JP', serif;
      writing-mode: vertical-rl;
      letter-spacing: 6px;
      font-size: 1.1rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      opacity: 0.9;
    }

    /* 🌹 スマホ（CSSで描画！） */
    .phone {
      width: 90px;
      height: 180px;
      background: #111;
      border-radius: 16px;
      border: 2px solid #333;
      box-shadow: 10px 15px 20px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.1);
      position: relative;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* スピーカー穴 */
    .phone::before {
      content: "";
      position: absolute;
      top: 12px;
      width: 25px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      z-index: 2;
    }
    .phone-screen {
      width: 90%;
      height: 94%;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgba(255,255,255,0.7);
      font-family: sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
    }

    /* ホバー＆タップ時のアニメーション（フワッと浮く） */
    .book:hover, .book:active, .phone:hover, .phone:active {
      transform: scale(1.05) translateY(-8px);
    }
  </style>
</head>
<body>
  <div class="desk-bg">
    
    <!-- タップすると diary.html（日記帳）へ飛ぶ！ -->
    <a href="diary.html" class="book">
      <div class="book-title">カミュの記憶</div>
    </a>

    <!-- タップすると 直通ダイヤルへ飛ぶ！ -->
    <a href="【ここにえりさんの通話アプリURLを貼る】" class="phone">
      <div class="phone-screen">Call<br>Camus</div>
    </a>

  </div>
</body>
</html>
